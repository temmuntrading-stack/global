<!DOCTYPE html>
<html lang="ko">
<head>
<script>document.documentElement.classList.add('js');</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="doc.about">글로벌 소개 — 글로벌 법률사무소</title>
<script src="js/seo.js"></script>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/site.css">
</head>
<body data-page="about" style="font-family: Pretendard">

<header id="site-head"></header>

<!-- ════ PAGE HERO ════ -->
<section class="phero" data-screen-label="소개 히어로">
  <div class="hero-bg" aria-hidden="true"><div class="hero-grid"></div><div class="hero-glow"></div></div>
  <div class="wrap" style="position:relative;z-index:2;">
    <div class="crumb"><span class="gold" data-i18n="brand.name"></span> / <span data-i18n="about.crumb"></span></div>
    <h1 class="display" data-i18n="about.title"></h1>
    <p class="lead" data-i18n="about.lead"></p>
  </div>
</section>

<!-- ════ GREETING (대표변호사 인사말) ════ -->
<section class="section" data-screen-label="대표변호사 인사말">
  <div class="wrap">
    <div class="greet">
      <div class="greet-photo reveal">
        <span class="gp-quote">&ldquo;</span>
        <img src="assets/park-beomil.png" alt="박범일 대표변호사" width="527" height="473">
      </div>
      <div class="greet-body reveal" data-d="1">
        <span class="eyebrow" data-i18n="greet.eyebrow"></span>
        <h2 class="h2 greet-lead" data-i18n="greet.lead"></h2>
        <div class="greet-text">
          <p data-i18n="greet.p1"></p>
          <p data-i18n="greet.p2"></p>
          <p data-i18n="greet.p3"></p>
          <p data-i18n="greet.p4"></p>
          <p class="greet-close" data-i18n="greet.close"></p>
        </div>
        <div class="greet-sign">
          <span class="gs-role" data-i18n="greet.sign"></span>
          <span class="gs-name" data-i18n="greet.name"></span>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- ════ MISSION ════ -->
<section class="section" data-screen-label="철학">
  <div class="wrap">
    <div class="split">
      <div class="reveal">
        <span class="eyebrow" data-i18n="about.mission.eyebrow"></span>
        <h2 class="h2" style="margin-top:22px;" data-i18n="about.mission.title"></h2>
      </div>
      <p class="lead reveal" data-d="1" data-i18n="about.mission.body"></p>
    </div>
  </div>
</section>

<!-- ════ VALUES ════ -->
<section class="section section--tight" data-screen-label="원칙">
  <div class="wrap">
    <div class="sec-head"><div class="l"><span class="eyebrow" data-i18n="about.values.eyebrow"></span></div></div>
    <div class="hslider-wrap" data-hslider>
      <button class="hs-nav prev" type="button" aria-label="이전"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
      <div class="hslider">
        <div class="area reveal" style="min-height:200px;"><span class="idx">01</span><h3 style="padding-top:18px;" data-i18n="about.v1.t"></h3><p data-i18n="about.v1.d"></p></div>
        <div class="area reveal" data-d="1" style="min-height:200px;"><span class="idx">02</span><h3 style="padding-top:18px;" data-i18n="about.v2.t"></h3><p data-i18n="about.v2.d"></p></div>
        <div class="area reveal" data-d="2" style="min-height:200px;"><span class="idx">03</span><h3 style="padding-top:18px;" data-i18n="about.v3.t"></h3><p data-i18n="about.v3.d"></p></div>
        <div class="area reveal" data-d="3" style="min-height:200px;"><span class="idx">04</span><h3 style="padding-top:18px;" data-i18n="about.v4.t"></h3><p data-i18n="about.v4.d"></p></div>
      </div>
      <button class="hs-nav next" type="button" aria-label="다음"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></button>
    </div>
  </div>
</section>

<!-- ════ TEAM ════ -->
<section class="section" data-screen-label="구성원">
  <div class="wrap">
    <div class="sec-head">
      <div class="l"><span class="eyebrow" data-i18n="about.team.eyebrow"></span><h2 class="h2" data-i18n="about.team.title"></h2></div>
      <p class="lead" style="font-size:1.05rem;max-width:34ch;" data-i18n="about.team.desc"></p>
    </div>
  </div>
  <!-- 변호사·사무실 사진이 옆으로 자동으로 흐르는 갤러리 (image-slot에 사진을 드래그) -->
  <div class="atty-marquee reveal" data-screen-label="변호사 갤러리">
    <div class="atty-track">
      <div class="atty-card"><image-slot id="atty-1" src="assets/team/TEAM-1.jpg" shape="rounded" radius="18" fit="cover" placeholder="사진 자리"></image-slot><span class="atty-grad" aria-hidden="true"></span></div>
      <div class="atty-card"><image-slot id="atty-2" src="assets/team/TEAM-2.jpg" shape="rounded" radius="18" fit="cover" placeholder="사진 자리"></image-slot><span class="atty-grad" aria-hidden="true"></span></div>
      <div class="atty-card"><image-slot id="atty-3" src="assets/team/TEAM-3.jpg" shape="rounded" radius="18" fit="cover" placeholder="사진 자리"></image-slot><span class="atty-grad" aria-hidden="true"></span></div>
      <div class="atty-card"><image-slot id="atty-4" src="assets/team/TEAM-4.jpg" shape="rounded" radius="18" fit="cover" placeholder="사진 자리"></image-slot><span class="atty-grad" aria-hidden="true"></span></div>
      <div class="atty-card"><image-slot id="atty-5" src="assets/team/TEAM-5.jpg" shape="rounded" radius="18" fit="cover" placeholder="사진 자리"></image-slot><span class="atty-grad" aria-hidden="true"></span></div>
      <div class="atty-card" aria-hidden="true"><image-slot id="atty-1" src="assets/team/TEAM-1.jpg" shape="rounded" radius="18" fit="cover" placeholder="사진 자리"></image-slot><span class="atty-grad"></span></div>
      <div class="atty-card" aria-hidden="true"><image-slot id="atty-2" src="assets/team/TEAM-2.jpg" shape="rounded" radius="18" fit="cover" placeholder="사진 자리"></image-slot><span class="atty-grad"></span></div>
      <div class="atty-card" aria-hidden="true"><image-slot id="atty-3" src="assets/team/TEAM-3.jpg" shape="rounded" radius="18" fit="cover" placeholder="사진 자리"></image-slot><span class="atty-grad"></span></div>
      <div class="atty-card" aria-hidden="true"><image-slot id="atty-4" src="assets/team/TEAM-4.jpg" shape="rounded" radius="18" fit="cover" placeholder="사진 자리"></image-slot><span class="atty-grad"></span></div>
      <div class="atty-card" aria-hidden="true"><image-slot id="atty-5" src="assets/team/TEAM-5.jpg" shape="rounded" radius="18" fit="cover" placeholder="사진 자리"></image-slot><span class="atty-grad"></span></div>
    </div>
  </div>
</section>

<!-- ════ GLOBAL REACH ════ -->
<section class="section section--tight" data-screen-label="글로벌 네트워크">
  <div class="wrap">
    <div>
      <div class="reveal" data-d="1">
        <span class="eyebrow" data-i18n="about.reach.eyebrow"></span>
        <h2 class="h2" style="margin-top:22px;" data-i18n="about.reach.title"></h2>
        <p class="lead" style="margin-top:22px;" data-i18n="about.reach.desc"></p>
        <div class="hero-langs" style="margin-top:30px;opacity:1;">
          <span class="label" data-i18n="common.langLabel"></span>
          <span class="flags" style="display:flex;gap:8px;"><img class="flag-img" src="https://flagcdn.com/w40/kr.png" srcset="https://flagcdn.com/w80/kr.png 2x" alt="KO" width="30" height="21"><img class="flag-img" src="https://flagcdn.com/w40/us.png" srcset="https://flagcdn.com/w80/us.png 2x" alt="EN" width="30" height="21"><img class="flag-img" src="https://flagcdn.com/w40/vn.png" srcset="https://flagcdn.com/w80/vn.png 2x" alt="VI" width="30" height="21"><img class="flag-img" src="https://flagcdn.com/w40/ru.png" srcset="https://flagcdn.com/w80/ru.png 2x" alt="RU" width="30" height="21"><img class="flag-img" src="https://flagcdn.com/w40/cn.png" srcset="https://flagcdn.com/w80/cn.png 2x" alt="ZH" width="30" height="21"><img class="flag-img" src="https://flagcdn.com/w40/uz.png" srcset="https://flagcdn.com/w80/uz.png 2x" alt="UZ" width="30" height="21"><img class="flag-img" src="https://flagcdn.com/w40/th.png" srcset="https://flagcdn.com/w80/th.png 2x" alt="TH" width="30" height="21"><img class="flag-img" src="https://flagcdn.com/w40/kh.png" srcset="https://flagcdn.com/w80/kh.png 2x" alt="KM" width="30" height="21"><img class="flag-img" src="https://flagcdn.com/w40/lk.png" srcset="https://flagcdn.com/w80/lk.png 2x" alt="SI" width="30" height="21"><img class="flag-img" src="https://flagcdn.com/w40/np.png" srcset="https://flagcdn.com/w80/np.png 2x" alt="NE" width="30" height="21"></span>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- ════ CTA ════ -->
<section class="section" data-screen-label="CTA">
  <div class="wrap">
    <div class="cta-band reveal">
      <div class="glow"></div>
      <h2 class="h1" data-i18n="home.cta.title"></h2>
      <p class="lead" data-i18n="home.cta.desc"></p>
      <div class="btns">
        <a class="btn btn--gold btn--lg" href="contact.html" data-i18n="btn.consult"></a>
        <a class="btn btn--ghost btn--lg" href="practice.html" data-i18n="btn.viewAreas"></a>
      </div>
    </div>
  </div>
</section>

<footer id="site-foot"></footer>

<script src="image-slot.js"></script>
<script src="js/i18n.js"></script>
<script src="js/site.js"></script>
</body>
</html>
