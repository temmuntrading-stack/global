<!DOCTYPE html>
<html lang="ko">
<head>
<script>document.documentElement.classList.add('js');</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="doc.contact">연락하기 — 글로벌 법률사무소</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/site.css">
<style>
  .mapbox{position:relative;border-radius:var(--r-lg);overflow:hidden;border:1px solid var(--line);aspect-ratio:16/8;background:var(--bg-2);}
  .map-embed{position:absolute;inset:0;width:100%;height:100%;border:0;display:block;}
  .map-foot2{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;margin-top:16px;}
  .map-foot2 .addr{font-size:15px;color:var(--ink);font-weight:600;}
  .map-foot2 .map-links{display:flex;gap:10px;flex-wrap:wrap;}
  .map-foot2 .btn{padding:10px 18px;font-size:14px;}
</style>
</head>
<body data-page="contact">

<header id="site-head"></header>

<!-- ════ PAGE HERO ════ -->
<section class="phero" data-screen-label="연락하기 히어로">
  <div class="hero-bg" aria-hidden="true"><div class="hero-grid"></div><div class="hero-glow"></div></div>
  <div class="wrap" style="position:relative;z-index:2;">
    <div class="crumb"><span class="gold" data-i18n="brand.name"></span> / <span data-i18n="contact.crumb"></span></div>
    <h1 class="display" data-i18n="contact.title"></h1>
    <p class="lead" data-i18n="contact.lead"></p>
  </div>
</section>

<!-- ════ CONTACT GRID ════ -->
<section class="section section--tight" data-screen-label="연락처 + 상담 신청">
  <div class="wrap">
    <div class="cgrid">
      <!-- info -->
      <div class="reveal">
        <span class="eyebrow" data-i18n="contact.info.title"></span>
        <div class="cinfo" style="margin-top:30px;">
          <div class="crow">
            <span class="ci-ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-5.7-7-11a7 7 0 0114 0c0 5.3-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg></span>
            <div><div class="ci-k" data-i18n="ci.addr.k"></div><div class="ci-v" data-i18n="ci.addr.v"></div></div>
          </div>
          <div class="crow">
            <span class="ci-ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.9v3a2 2 0 01-2.2 2 19.8 19.8 0 01-8.6-3 19.5 19.5 0 01-6-6 19.8 19.8 0 01-3-8.6A2 2 0 014.1 2h3a2 2 0 012 1.7c.1.9.3 1.8.6 2.6a2 2 0 01-.4 2.1L8.1 9.9a16 16 0 006 6l1.5-1.2a2 2 0 012.1-.4c.8.3 1.7.5 2.6.6a2 2 0 011.7 2z"/></svg></span>
            <div><div class="ci-k" data-i18n="ci.phone.k"></div><a class="ci-v num" href="tel:+82222772442" data-i18n="ci.phone.v"></a></div>
          </div>
          <div class="crow">
            <span class="ci-ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg></span>
            <div><div class="ci-k" data-i18n="ci.email.k"></div><a class="ci-v" href="mailto:lawsqare@naver.com" data-i18n="ci.email.v"></a></div>
          </div>
          <div class="crow">
            <span class="ci-ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></span>
            <div><div class="ci-k" data-i18n="ci.hours.k"></div><div class="ci-v" style="font-size:16px;" data-i18n="ci.hours.v"></div></div>
          </div>
        </div>
        <!-- blog -->
        <div class="blogcard reveal" style="margin-top:34px;padding:26px;">
          <div style="display:flex;align-items:center;gap:18px;">
            <span class="nb">N</span>
            <div><div class="h3" style="font-size:1.15rem;" data-i18n="contact.blog.title"></div>
            <p class="muted" style="font-size:14px;margin:6px 0 0;max-width:30ch;" data-i18n="contact.blog.desc"></p></div>
          </div>
          <a class="btn btn--ghost" href="https://blog.naver.com/lawsqare" target="_blank" rel="noopener" data-i18n="contact.blog.btn"></a>
        </div>
      </div>

      <!-- form -->
      <div class="card reveal" data-d="1">
        <h2 class="h3" style="margin-bottom:8px;" data-i18n="contact.form.title"></h2>
        <div class="form-ok" id="formOk"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg><span data-i18n="f.success"></span></div>
        <form class="form" id="consultForm" style="margin-top:18px;">
          <div class="field">
            <label data-i18n="f.name"></label>
            <input type="text" name="name" required data-i18n-ph="f.name.ph">
          </div>
          <div class="field-row">
            <div class="field"><label data-i18n="f.email"></label><input type="email" name="email" required data-i18n-ph="f.email.ph"></div>
            <div class="field"><label data-i18n="f.phone"></label><input type="tel" name="phone" data-i18n-ph="f.phone.ph"></div>
          </div>
          <div class="field-row">
            <div class="field"><label data-i18n="f.lang"></label>
              <select name="lang" id="cf-lang"><option value="ko">한국어</option></select>
            </div>
            <div class="field"><label data-i18n="f.area"></label>
              <select name="area" id="cf-area"><option></option></select>
            </div>
          </div>
          <div class="field">
            <label data-i18n="f.msg"></label>
            <textarea name="message" required data-i18n-ph="f.msg.ph"></textarea>
          </div>
          <button type="submit" class="btn btn--gold btn--lg" style="width:100%;" data-i18n="f.submit"></button>
          <p class="form-note" data-i18n="f.note"></p>
        </form>
      </div>
    </div>
  </div>
</section>

<!-- ════ MAP (OpenStreetMap 오픈데이터 지도) ════ -->
<section class="section section--tight" data-screen-label="오시는 길">
  <div class="wrap">
    <div class="mapbox reveal">
      <iframe class="map-embed" title="글로벌 법률사무소 위치 (을지로 254)" loading="lazy" referrerpolicy="no-referrer-when-downgrade"
        src="https://www.openstreetmap.org/export/embed.html?bbox=126.9862%2C37.5631%2C126.9982%2C37.5695&amp;layer=mapnik&amp;marker=37.5663%2C126.9922"></iframe>
    </div>
    <div class="map-foot2">
      <span class="addr" data-i18n="ci.addr.v"></span>
      <span class="map-links">
        <a class="btn btn--ghost" href="https://www.openstreetmap.org/?mlat=37.5663&mlon=126.9922#map=17/37.5663/126.9922" target="_blank" rel="noopener">OpenStreetMap</a>
        <a class="btn btn--ghost" href="https://map.naver.com/p/search/%EC%9D%84%EC%A7%80%EB%A1%9C%20254" target="_blank" rel="noopener" data-i18n="contact.map.label"></a>
      </span>
    </div>
  </div>
</section>

<footer id="site-foot"></footer>

<script src="js/i18n.js"></script>
<script src="js/site.js"></script>
</body>
</html>
