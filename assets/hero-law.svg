<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" preserveAspectRatio="xMidYMid slice" fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round" role="img" aria-label="law">
