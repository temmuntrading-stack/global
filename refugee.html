<!DOCTYPE html>

<header id="site-head"></header>

<!-- ════ HERO ════ -->
<section class="px-hero" data-screen-label="난민 히어로">

  <div class="px-blob b2" aria-hidden="true"></div>
  <div class="wrap">
    <div class="px-hero-grid">

        <div class="px-cta reveal" data-d="3">

            <svg class="arr" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
          </a>
          <a class="btn btn--ghost btn--lg" href="tel:+82222772442"><span class="num">02 2277 2442</span></a>
        </div>
        <div class="px-trust reveal" data-d="3">
          <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg><span data-i18n="rf.trust1"></span></span>
          <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg><span data-i18n="rf.trust2"></span></span>
          <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg><span data-i18n="rf.trust3"></span></span>
        </div>
      </div>
      <div class="px-illu reveal" data-d="2">
        <span class="ring" aria-hidden="true"></span>
        <image-slot id="rf-hero-illu" src="assets/hero-gradient.svg" shape="rounded" radius="28" placeholder="일러스트 이미지를 드래그하세요"></image-slot>
        <div class="px-chip c1"><span class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l8 4v6c0 5-3.5 8-8 10-4.5-2-8-5-8-10V6z"/><path d="M9 12l2 2 4-4"/></svg></span><span data-i18n-html="rf.chip1"></span></div>
        <div class="px-chip c2"><span class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l3 8 4-16 3 8h4"/></svg></span><span data-i18n-html="rf.chip2"></span></div>
        <div class="px-chip c3"><span class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l8 4v6c0 5-3.5 8-8 10-4.5-2-8-5-8-10V6z"/><path d="M9 12l2 2 4-4"/></svg></span><span data-i18n="rf.chip3"></span></div>
      </div>
    </div>
  </div>
</section>

<!-- ════ 신뢰 지표 ════ -->
<section class="section section--tight" data-screen-label="신뢰 지표">
  <div class="wrap">
    <div class="px-stats">
      <div class="px-stat reveal"><div class="v"><span data-count="10">0</span><span class="u" data-i18n="rf.u1"></span></div><div class="k" data-i18n="rf.k1"></div></div>
      <div class="px-stat reveal" data-d="1"><div class="v"><span data-count="24">0</span><span class="u" data-i18n="rf.u2"></span></div><div class="k" data-i18n="rf.k2"></div></div>
      <div class="px-stat reveal" data-d="2"><div class="v"><span data-count="100">0</span><span class="u" data-i18n="rf.u3"></span></div><div class="k" data-i18n="rf.k3"></div></div>

    </div>
  </div>
</section>

<!-- ════ 고민 체크리스트 ════ -->
<section class="section bg-soft" data-screen-label="고민 체크리스트">
  <div class="wrap">
    <div class="sec-head"><div class="l"><span class="eyebrow">CHECK</span><h2 class="h2" data-i18n="rf.h2.check"></h2></div></div>
    <div class="px-pains">
      <div class="px-pain reveal"><span class="ck"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span><span data-i18n="rf.pain1"></span></div>
      <div class="px-pain reveal" data-d="1"><span class="ck"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span><span data-i18n="rf.pain2"></span></div>
      <div class="px-pain reveal" data-d="2"><span class="ck"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span><span data-i18n="rf.pain3"></span></div>
      <div class="px-pain teal reveal"><span class="ck"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span><span data-i18n="rf.pain4"></span></div>
      <div class="px-pain teal reveal" data-d="1"><span class="ck"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span><span data-i18n="rf.pain5"></span></div>
      <div class="px-pain teal reveal" data-d="2"><span class="ck"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span><span data-i18n="rf.pain6"></span></div>
      <div class="px-pain reveal" style="grid-column:1/-1;"><span class="ck"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span><span data-i18n="rf.pain7"></span></div>
    </div>
  </div>
</section>

<!-- ════ 도와드리는 절차 (bento) ════ -->
<section class="section" data-screen-label="절차 안내">
  <div class="wrap">
    <div class="sec-head"><div class="l"><span class="eyebrow">SCOPE</span><h2 class="h2" data-i18n="rf.h2.scope"></h2></div></div>
    <div class="px-bento">
      <div class="px-card feat span4 reveal">
        <div class="ac-ic"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l8 4v6c0 5-3.5 8-8 10-4.5-2-8-5-8-10V6z"/><path d="M9 12l2 2 4-4"/></svg></div>
        <h3 data-i18n="rf.b1.h3"></h3>
        <div class="ac-sub" data-i18n="rf.b1.sub"></div>
        <p class="desc" data-i18n="rf.b1.desc"></p>
        <div class="px-cap" data-i18n="rf.cap1"></div>
        <div class="px-tags">
          <span class="t" data-i18n="rf.b1.t1"></span><span class="t" data-i18n="rf.b1.t2"></span><span class="t" data-i18n="rf.b1.t3"></span>
          <span class="t" data-i18n="rf.b1.t4"></span><span class="t" data-i18n="rf.b1.t5"></span>
        </div>
      </div>
      <div class="px-card span2 px-note-tile brand reveal" data-d="1">
        <span class="nt-ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 2"/></svg></span>
        <div>
          <div class="nt-t" data-i18n-html="rf.note1.t"></div>
          <div class="nt-d" data-i18n="rf.note1.d"></div>
        </div>
      </div>
      <div class="px-card span2 px-note-tile teal reveal">
        <span class="nt-ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M4 12h16M4 17h10"/></svg></span>
        <div>
          <div class="nt-t" data-i18n-html="rf.note2.t"></div>
          <div class="nt-d" data-i18n="rf.note2.d"></div>
        </div>
      </div>
      <div class="px-card feat teal span4 reveal" data-d="1">
        <div class="ac-ic"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l3 8 4-16 3 8h4"/></svg></div>
        <h3 data-i18n="rf.b2.h3"></h3>
        <div class="ac-sub" data-i18n="rf.b2.sub"></div>
        <p class="desc" data-i18n="rf.b2.desc"></p>
        <div class="px-cap" data-i18n="rf.cap2"></div>
        <div class="px-tags">
          <span class="t" data-i18n="rf.b2.t1"></span><span class="t" data-i18n="rf.b2.t2"></span><span class="t" data-i18n="rf.b2.t3"></span>
          <span class="t" data-i18n="rf.b2.t4"></span><span class="t" data-i18n="rf.b2.t5"></span>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- ════ 왜 전문가 ════ -->
<section class="section bg-soft" data-screen-label="전문가의 도움">

    <div class="sec-head"><div class="l"><span class="eyebrow">WHY EXPERT</span><h2 class="h2" data-i18n="rf.h2.why"></h2></div></div>

      <div class="area reveal"><span class="idx">01</span><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l2.4 4.9 5.4.8-3.9 3.8.9 5.4-4.8-2.5-4.8 2.5.9-5.4L4.2 8.7l5.4-.8z"/></svg><h3 style="padding-top:20px;" data-i18n="rf.a1.h3"></h3><p data-i18n="rf.a1.p"></p></div>
      <div class="area reveal" data-d="1"><span class="idx">02</span><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 00-2 2v14a2 2 0 002 2h10a2 2 0 002-2V8z"/><path d="M14 3v5h5M9 13l2 2 4-4"/></svg><h3 style="padding-top:20px;" data-i18n="rf.a2.h3"></h3><p data-i18n="rf.a2.p"></p></div>
      <div class="area reveal" data-d="2"><span class="idx">03</span><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L4.5 13.5H11l-1 8.5 8.5-11.5H12z"/></svg><h3 style="padding-top:20px;" data-i18n="rf.a3.h3"></h3><p data-i18n="rf.a3.p"></p></div>
    </div>
  </div>
</section>

<!-- ════ 상담 절차 ════ -->
<section class="section" data-screen-label="상담 절차">
  <div class="wrap">
    <div class="sec-head"><div class="l"><span class="eyebrow">PROCESS</span><h2 class="h2" data-i18n="rf.h2.process"></h2></div></div>
